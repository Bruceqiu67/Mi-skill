# 书 + 推文联合蒸馏 — 配置模板
# 复制为 settings.local.yaml 并填入你的值

book:
  # 本地文件路径（支持 PDF/EPUB）
  path: ""  # 例如: "./data/book.pdf" 或 "./data/book.epub"
  # 或在线 URL
  url: ""

twitter:
  # 目标账号（不含 @）
  username: ""  # 例如: "username"
  # 采集条数上限
  max_tweets: 6000
  # Playwright 设置
  headless: true
  scroll_pause_ms: 1500

llm:
  # OpenAI-compatible API
  api_base: "https://api.openai.com/v1"
  model: "gpt-4o"
  # 也可以使用本地模型 (ollama, vllm 等)
  # api_base: "http://localhost:11434/v1"
  # model: "llama3.1"

output:
  # 输出目录
  dir: "./output"
  # 中间产物
  book_skeleton: "book_skeleton.md"
  tweet_findings: "tweet_findings.jsonl"
  cross_validation: "cross_validation.md"
  final_skill: "SKILL.md"
